# dotfiles bootstrap 設定 (mise bootstrap で適用)
# グローバルの [tools] は mise/global.toml (~/.config/mise/config.toml) 側で管理する。
# このファイルはリポジトリ内での mise 実行時に auto-discovery される前提の設計。

# 宣言外のパッケージは自動削除しない (prune は手動運用: mise bootstrap packages prune)
[bootstrap.brew.taps]
"coderabbitai/tap" = "https://github.com/coderabbitai/homebrew-tap.git"
"hashicorp/tap" = "https://github.com/hashicorp/homebrew-tap.git"
"leoafarias/fvm" = "https://github.com/leoafarias/homebrew-fvm.git"

[bootstrap.packages]
# --- formulae ---
"brew:agent-browser" = "latest"
"brew:bat" = "latest"
"brew:broot" = "latest"
"brew:cloud-sql-proxy" = "latest"
"brew:cloudflared" = "latest"
"brew:detect-secrets" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:ffmpeg" = "latest"
"brew:fzf" = "latest"
"brew:genact" = "latest"
"brew:gh" = "latest"
"brew:ghq" = "latest"
"brew:git" = "latest"
"brew:git-delta" = "latest"
"brew:git-filter-repo" = "latest"
"brew:helm" = "latest"
"brew:hey" = "latest"
"brew:icu4c@76" = "latest"
"brew:jq" = "latest"
"brew:k6" = "latest"
"brew:kubernetes-cli" = "latest"
"brew:lefthook" = "latest"
"brew:libmagic" = "latest"
"brew:libpq" = "latest"
"brew:mas" = "latest"
"brew:mise" = "latest"
"brew:neovim" = "latest"
"brew:nkf" = "latest"
"brew:openjdk@21" = "latest"
"brew:pkgconf" = "latest"
"brew:python@3.12" = "latest"
"brew:rbenv" = "latest"
"brew:ruby-build" = "latest"
"brew:starship" = "latest"
"brew:the_silver_searcher" = "latest"
"brew:uv" = "latest"
"brew:watch" = "latest"
"brew:yazi" = "latest"
"brew:yq" = "latest"
"brew:zplug" = "latest"
"brew:coderabbitai/tap/git-gtr" = "latest"
"brew:hashicorp/tap/terraform" = "latest"
"brew:leoafarias/fvm/fvm" = "latest"
# --- Mac App Store ---
"mas:6757801838" = "latest" # RunCat Neo
"mas:497799835" = "latest" # Xcode

# source はこの mise.toml があるディレクトリ (リポジトリルート) 基準で解決される
[dotfiles]
"~/.editorconfig" = { source = "editorconfig/editorconfig", mode = "symlink" }
"~/.config/starship.toml" = { source = "starship/starship.toml", mode = "symlink" }
"~/.config/ghostty/config" = { source = "ghostty/config", mode = "symlink" }
"~/.gitconfig" = { source = "git/gitconfig", mode = "symlink" }
"~/.gitconfig_company" = { source = "git/gitconfig_company", mode = "symlink" }
"~/.gitconfig_private" = { source = "git/gitconfig_private", mode = "symlink" }
"~/.gitignore_global" = { source = "git/gitignore_global", mode = "symlink" }
"~/.bin/git-aic" = { source = "bin/git-aic", mode = "symlink" }
"~/.bin/git-cpr" = { source = "bin/git-cpr", mode = "symlink" }
"~/.bin/git-sync-upstream" = { source = "bin/git-sync-upstream", mode = "symlink" }
# mise は <repo>/mise/config.toml を auto-discovery してしまうため global.toml と命名している
"~/.config/mise/config.toml" = { source = "mise/global.toml", mode = "symlink" }
"~/.zshrc" = { source = "zsh/zshrc", mode = "symlink" }
"~/.zprofile" = { source = "zsh/zprofile", mode = "symlink" }
"~/.zsh_functions/ghw.zsh" = { source = "zsh/zsh_functions/ghw.zsh", mode = "symlink" }
# ~/.claude 自体は実ディレクトリのまま残し、git 管理対象だけを個別 symlink する
# (history.jsonl / sessions/ / projects/ などの動的書き込みと共存させるため)
"~/.claude/CLAUDE.md" = { source = "claude/CLAUDE.md", mode = "symlink" }
"~/.claude/settings.json" = { source = "claude/settings.json", mode = "symlink" }
"~/.claude/mcp.json" = { source = "claude/mcp.json", mode = "symlink" }
"~/.claude/keybindings.json" = { source = "claude/keybindings.json", mode = "symlink" }
"~/.claude/agents" = { source = "claude/agents", mode = "symlink" }
"~/.claude/references" = { source = "claude/references", mode = "symlink" }
"~/.claude/rules" = { source = "claude/rules", mode = "symlink" }
"~/.claude/scripts" = { source = "claude/scripts", mode = "symlink" }
"~/.claude/assets" = { source = "claude/assets", mode = "symlink" }

# 値は基本的に現在の Mac の `defaults read` から取得したものを反映。
# mise が非対応の項目 (array / dict / -currentHost / sudo 系 / killall) は
# scripts/macos-extra.sh で適用する (post-defaults hook)。
[bootstrap.macos.defaults.NSGlobalDomain]
AppleInterfaceStyle = "Dark"
AppleShowAllExtensions = true
AppleShowScrollBars = "Always"
KeyRepeat = 2
InitialKeyRepeat = 15
NSAutomaticSpellingCorrectionEnabled = false
NSAutomaticCapitalizationEnabled = false
NSAutomaticDashSubstitutionEnabled = false
NSAutomaticPeriodSubstitutionEnabled = false
NSAutomaticQuoteSubstitutionEnabled = false
ApplePressAndHoldEnabled = false
AppleEnableSwipeNavigateWithScrolls = true
"com.apple.mouse.tapBehavior" = 1
"com.apple.mouse.scaling" = 1.5
"com.apple.trackpad.scaling" = 2.0
"com.apple.trackpad.forceClick" = true
"com.apple.swipescrolldirection" = true

[bootstrap.macos.defaults."com.apple.dock"]
autohide = false
autohide-delay = 0.0
autohide-time-modifier = 0.0
orientation = "left"
show-recents = false
mru-spaces = false
mineffect = "scale"
tilesize = 64

[bootstrap.macos.defaults."com.apple.finder"]
_FXShowPosixPathInTitle = true
_FXSortFoldersFirst = true
AppleShowAllExtensions = true
ShowPathbar = true
ShowStatusBar = true
FXEnableExtensionChangeWarning = false
FXPreferredViewStyle = "Nlsv"
WarnOnEmptyTrash = false

[bootstrap.macos.defaults."com.apple.AppleMultitouchTrackpad"]
Clicking = true
TrackpadRightClick = true
TrackpadThreeFingerDrag = false
ActuateDetents = 1
DragLock = 0
Dragging = 0
FirstClickThreshold = 1
ForceSuppressed = 0
SecondClickThreshold = 1
TrackpadCornerSecondaryClick = 2
TrackpadFiveFingerPinchGesture = 2
TrackpadFourFingerHorizSwipeGesture = 2
TrackpadFourFingerPinchGesture = 2
TrackpadFourFingerVertSwipeGesture = 2
TrackpadHandResting = 1
TrackpadHorizScroll = 1
TrackpadMomentumScroll = 1
TrackpadPinch = 1
TrackpadRotate = 1
TrackpadScroll = 1
TrackpadThreeFingerHorizSwipeGesture = 1
TrackpadThreeFingerTapGesture = 0
TrackpadThreeFingerVertSwipeGesture = 1
TrackpadTwoFingerDoubleTapGesture = 1
TrackpadTwoFingerFromRightEdgeSwipeGesture = 3
USBMouseStopsTrackpad = 0

[bootstrap.macos.defaults."com.apple.driver.AppleBluetoothMultitouch.trackpad"]
Clicking = true
TrackpadRightClick = true
TrackpadThreeFingerDrag = false
DragLock = 0
Dragging = 0
TrackpadCornerSecondaryClick = 2
TrackpadFiveFingerPinchGesture = 2
TrackpadFourFingerHorizSwipeGesture = 2
TrackpadFourFingerPinchGesture = 2
TrackpadFourFingerVertSwipeGesture = 2
TrackpadHandResting = 1
TrackpadHorizScroll = 1
TrackpadMomentumScroll = 1
TrackpadPinch = 1
TrackpadRotate = 1
TrackpadScroll = 1
TrackpadThreeFingerHorizSwipeGesture = 1
TrackpadThreeFingerTapGesture = 0
TrackpadThreeFingerVertSwipeGesture = 1
TrackpadTwoFingerDoubleTapGesture = 1
TrackpadTwoFingerFromRightEdgeSwipeGesture = 3
USBMouseStopsTrackpad = 0

[bootstrap.macos.defaults."com.apple.screencapture"]
type = "jpg"

[bootstrap.macos.defaults."com.apple.menuextra.clock"]
ShowSeconds = true

[bootstrap.macos.defaults."com.apple.LaunchServices"]
LSQuarantine = false

[bootstrap.macos.defaults."com.apple.desktopservices"]
DSDontWriteNetworkStores = true

[bootstrap.macos.defaults."com.apple.CrashReporter"]
DialogType = "none"

[bootstrap.macos.defaults."com.apple.menuextra.battery"]
ShowPercent = "YES"

# cask は brew bundle に委譲 (理由は homebrew/Brewfile 冒頭コメント参照)
[bootstrap.hooks.post-packages]
run = "HOMEBREW_BUNDLE_NO_UPGRADE=1 brew bundle install --file=homebrew/Brewfile"

[bootstrap.hooks.post-defaults]
run = "./scripts/macos-extra.sh"

[bootstrap.user]
login_shell = "/bin/zsh"

# CapsLock を Control にリマップ (ログイン毎に hidutil で適用。マッピングは再起動で揮発するため)
# 0x700000039 = CapsLock, 0x7000000E0 = Left Control
[bootstrap.macos.launchd.agents.remap-capslock]
program = "/usr/bin/hidutil"
args = [
  "property",
  "--set",
  '{"UserKeyMapping":[{"HIDKeyboardModifierMappingSrc":0x700000039,"HIDKeyboardModifierMappingDst":0x7000000E0}]}',
]
run_at_load = true

# bootstrap 実行毎に走るため冪等に保つこと
[tasks.bootstrap]
run = """
#!/bin/bash
set -euo pipefail

# ~/.ssh ディレクトリと鍵の権限を正規化し、id_ed25519 が未生成なら作成する
mkdir -p ~/.ssh
chmod 700 ~/.ssh
key=~/.ssh/id_ed25519
if [ ! -e "$key" ]; then
  ssh-keygen -t ed25519 -N "" -C "$USER@$(hostname -s)" -f "$key"
fi
chmod 600 ~/.ssh/id_* 2>/dev/null || true
chmod 600 ~/.ssh/*_rsa 2>/dev/null || true
chmod 644 ~/.ssh/*.pub 2>/dev/null || true
[ -f ~/.ssh/config ] && chmod 600 ~/.ssh/config || true
"""
